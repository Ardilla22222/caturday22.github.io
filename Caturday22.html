<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>"Caturday 22"</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #0d0b0d 0%, #1a0f1a 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .imagenes {
      width: 75%;
      overflow-y: auto;
      padding: 1rem;
      scrollbar-width: thin;
      scrollbar-color: #444 #1a0f1a;
    }
    .imagenes::-webkit-scrollbar {
      width: 6px;
    }
    .imagenes::-webkit-scrollbar-thumb {
      background-color: #444;
      border-radius: 3px;
    }
    .imagenes figure {
      margin: 0 0 1.5rem 0;
      text-align: center;
    }
    .imagenes img {
      max-width: 95%;
      height: auto;
      border: 1px solid #333;
      transition: transform 0.3s ease;
    }
    .imagenes img:hover {
      transform: scale(1.02);
    }
    .texto {
      width: 25%;
      overflow-y: auto;
      padding: 2rem;
      font-size: 12px;
      line-height: 1.6;
      scrollbar-width: thin;
      scrollbar-color: #444 #0d0b0d;
    }
    .texto::-webkit-scrollbar {
      width: 6px;
    }
    .texto::-webkit-scrollbar-thumb {
      background-color: #444;
      border-radius: 3px;
    }
    .texto h1 {
      font-size: 22px;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    footer {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      padding: 1rem;
      border-top: 1px solid #333;
    }
    /* Responsive */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .imagenes, .texto {
        width: 100%;
        height: auto;
      }
      .texto {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- a la izq imagenes -->
    <div class="imagenes">
      <figure><img src="Caturday22-Santiago-Sticker.jpg" alt=" "></figure>
      <figure><img src="Caturday-San-Pedro-de-atacama-sticker.jpg" alt=" "></figure>
      <figure><img src="Caturday22-Cancun-Sticker.jpg" alt=" "></figure>
      
  

      <!-- agregar por cada imagen que quiera poner  -->
    </div>

    <!-- a la derecha puedo escribir el texto que necesite -->
    <div class="texto">
      <h1>"Caturday 22"</h1>
      <p>
        Gracias por su interes
      </p>
      <p>
        
    
      </p>
      <p>
        
      <p><strong>Caturday22, La Tierra, 2021-presente </strong> – CATURDAY22.COM</p>
    </div>
  </div>

  <footer>
    © 2026 Caturday22 – “algo que parece anterior al arte .. y posterior a él”
  </footer>

</body>
</html>
